server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Static assets — no cache for local dev iteration.
    # Production hosting (CF Pages) sets its own cache policy.
    location ~* \.(css|js|svg|png|ico|woff2?|html)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires off;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
