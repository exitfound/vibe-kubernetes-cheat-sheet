<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1022"/>
      <stop offset="100%" stop-color="#18091e"/>
    </linearGradient>
    <linearGradient id="fg" x1="4" y1="6" x2="28" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4fe5ff"/>
      <stop offset="100%" stop-color="#c4a8ff"/>
    </linearGradient>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(79,229,255,0.3)" stroke-width="0.8"/>

  <!-- left node -->
  <rect x="4" y="9" width="9" height="9" rx="2" fill="none" stroke="url(#fg)" stroke-width="1.6"/>
  <!-- right node -->
  <rect x="19" y="14" width="9" height="9" rx="2" fill="none" stroke="url(#fg)" stroke-width="1.6"/>
  <!-- arrow -->
  <line x1="13" y1="13.5" x2="19" y2="18.5" stroke="url(#fg)" stroke-width="1.6" stroke-linecap="round"/>
  <!-- packet -->
  <circle cx="16" cy="16" r="1.8" fill="#4fe5ff"/>
</svg>
